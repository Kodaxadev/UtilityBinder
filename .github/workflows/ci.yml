name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: quality gates only — Vercel's GitHub integration owns deploys.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install (clean, lockfile-exact)
        run: npm ci

      - name: Audit (fail on high+)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
